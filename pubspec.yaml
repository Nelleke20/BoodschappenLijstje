name: boodschappenlijstje
description: "Collaborative shopping list app for households - Boodschappenlijstje"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.3.0

  # Swipe to delete / slidable items
  flutter_slidable: ^3.1.1

  # Unique IDs
  uuid: ^4.4.2

  # Sharing
  share_plus: ^10.0.2

  # Connectivity
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
